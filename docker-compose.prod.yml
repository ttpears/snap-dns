# docker-compose.prod.yml
# Production stack. Configure once, then run.
#
#   cp .env.production.example .env      # set SESSION_SECRET, TSIG_ENCRYPTION_KEY + public URLs
#
# Run with pre-built images from ghcr.io (fastest):
#   docker compose -f docker-compose.prod.yml up -d
#
# Or build the images from source locally:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Behind a Traefik proxy: create the network (docker network create proxy),
# set FQDN and FQDN_API in .env, and uncomment the proxy network + labels.

services:
  frontend:
    image: ghcr.io/ttpears/snap-dns-frontend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: prod
    container_name: snap-dns-frontend-prod
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - snap-dns-network
      # - proxy
    environment:
      - NODE_ENV=production
      # URL the browser uses to reach the backend (baked in at startup).
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:3002}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=proxy"
    #   - "traefik.http.routers.snap-dns.rule=Host(`${FQDN}`)"
    #   - "traefik.http.routers.snap-dns.entrypoints=websecure"
    #   - "traefik.http.routers.snap-dns.tls=true"
    #   - "traefik.http.services.snap-dns.loadBalancer.server.port=3001"
    restart: unless-stopped

  backend:
    image: ghcr.io/ttpears/snap-dns-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: prod
    container_name: snap-dns-backend-prod
    ports:
      - "${BACKEND_PORT:-3002}:3002"
    volumes:
      - backend_data:/app/data
      - temp-keys:/tmp/snap-dns
    networks:
      - snap-dns-network
      # - proxy
    environment:
      - NODE_ENV=production
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=3002
      # Required — the stack refuses to start without it.
      # Generate with: openssl rand -base64 32
      - "SESSION_SECRET=${SESSION_SECRET:?required - copy .env.production.example to .env and set it}"
      # Required — encrypts TSIG keys at rest; the backend refuses to start
      # without it in production. Keep this value STABLE: it is scrypt-derived
      # with a fixed salt, so changing it makes already-stored keys unreadable.
      # Generate with: openssl rand -base64 32
      - "TSIG_ENCRYPTION_KEY=${TSIG_ENCRYPTION_KEY:?required - copy .env.production.example to .env and set it}"
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001}
      - MAX_REQUEST_SIZE=${MAX_REQUEST_SIZE:-10mb}
      - MAX_ZONE_RECORDS=${MAX_ZONE_RECORDS:-10000}
      - ZONE_RECORDS_WARNING_THRESHOLD=${ZONE_RECORDS_WARNING_THRESHOLD:-5000}
      - MAX_DIG_OUTPUT_SIZE=${MAX_DIG_OUTPUT_SIZE:-52428800}
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=proxy"
    #   - "traefik.http.routers.snap-dns-api.rule=Host(`${FQDN_API}`)"
    #   - "traefik.http.routers.snap-dns-api.entrypoints=websecure"
    #   - "traefik.http.routers.snap-dns-api.tls=true"
    #   - "traefik.http.services.snap-dns-api.loadBalancer.server.port=3002"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    cap_add:
      - NET_RAW
    restart: unless-stopped

volumes:
  backend_data:
  temp-keys:

networks:
  snap-dns-network:
    driver: bridge
  # proxy:
  #   external: true
  #   name: proxy
