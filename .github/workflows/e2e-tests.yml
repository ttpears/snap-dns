# .github/workflows/e2e-tests.yml
# Verifies the Docker test stack builds and starts correctly

name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  integration-tests:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start test environment
        run: |
          docker compose -f docker-compose.test.yml up -d --build
          echo "Waiting for services to be ready..."
          sleep 15

      - name: Verify services are healthy
        run: |
          docker compose -f docker-compose.test.yml ps
          echo ""
          echo "Backend health check:"
          curl -f http://localhost:3002/health
          echo ""
          echo "Frontend health check:"
          curl -f http://localhost:3001

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          docker logs snap-dns-test-backend --tail 100
          echo ""
          echo "=== Frontend Logs ==="
          docker logs snap-dns-test-frontend --tail 100
          echo ""
          echo "=== DNS Server Logs ==="
          docker logs snap-dns-test-server --tail 50

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down -v
