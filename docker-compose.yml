# docker-compose.yml
# Local development environment with hot reload
# Usage: docker compose up

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: base
    container_name: snap-dns-frontend
    ports:
      - "3001:3001"
    volumes:
      - ./src:/app/src:delegated
      - ./public:/app/public:delegated
      - ./scripts:/app/scripts:delegated
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - frontend_node_modules:/app/node_modules
    networks:
      - snap-dns-network
    environment:
      - NODE_ENV=development
      - PORT=3001
      - WDS_SOCKET_PORT=3001
      - WATCHPACK_POLLING=true
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
      - REACT_APP_API_URL=http://localhost:3002
    command: npm start
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: base
    container_name: snap-dns-backend
    ports:
      - "3002:3002"
    volumes:
      - ./backend/src:/app/src:delegated
      - ./backend/tsconfig.json:/app/tsconfig.json:delegated
      - ./backend/.env:/app/.env:delegated
      - backend_node_modules:/app/node_modules
      - temp-keys:/tmp/snap-dns
    networks:
      - snap-dns-network
    environment:
      - NODE_ENV=development
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=3002
    command: npm run dev
    cap_add:
      - NET_RAW
    restart: unless-stopped

volumes:
  frontend_node_modules:
  backend_node_modules:
  temp-keys:

networks:
  snap-dns-network:
    driver: bridge
